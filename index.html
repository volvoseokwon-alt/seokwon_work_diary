<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>석원이의 업무 다이어리</title>
<style>
:root {
  --bg:#f4f6f9;--card:#fff;--text:#1e293b;
  --primary:#4f46e5;--accent:#10b981;--early:#0284c7;
  --warn:#ef4444;--border:#e2e8f0;--muted:#64748b;--pri-light:#eef2ff;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}
body{background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
/* Header */
header{background:var(--primary);color:white;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px;}
header h1{font-size:1.05rem;font-weight:700;white-space:nowrap;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.score-badge{background:rgba(255,255,255,.18);padding:4px 12px;border-radius:20px;font-size:0.8rem;white-space:nowrap;}
.week-badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);padding:4px 10px;border-radius:20px;font-size:0.78rem;white-space:nowrap;font-weight:600;}
/* Layout */
.container{display:flex;flex:1;overflow:hidden;}
/* Sidebar */
aside{width:200px;background:var(--card);border-right:1px solid var(--border);padding:14px 10px;display:flex;flex-direction:column;gap:4px;flex-shrink:0;overflow-y:auto;min-width:140px;max-width:400px;position:relative;}
.sidebar-resizer{width:5px;background:transparent;cursor:col-resize;position:absolute;right:0;top:0;bottom:0;z-index:10;transition:background .15s;}
.sidebar-resizer:hover,.sidebar-resizer.dragging{background:var(--primary);}
aside h3{font-size:0.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:8px 0 4px;padding:0 4px;}
.project-item{padding:8px 10px;border-radius:7px;cursor:pointer;font-size:0.85rem;color:var(--muted);transition:.15s;display:flex;align-items:center;gap:7px;position:relative;}
.project-item:hover{background:var(--bg);color:var(--text);}
.project-item.active{background:var(--primary);color:white;font-weight:600;}
.proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.inactive-dot{width:7px;height:7px;border-radius:50%;margin-left:auto;flex-shrink:0;}
.add-proj-btn{margin-top:6px;width:100%;background:none;border:1.5px dashed var(--border);border-radius:7px;padding:7px;font-size:0.78rem;color:var(--muted);cursor:pointer;}
.add-proj-btn:hover{border-color:var(--primary);color:var(--primary);}
.sidebar-note{border-top:1px solid var(--border);margin-top:8px;padding-top:10px;}
.note-area{width:100%;border:1.5px solid var(--border);border-radius:6px;padding:7px 8px;font-size:0.78rem;resize:vertical;min-height:80px;font-family:inherit;color:var(--text);line-height:1.5;}
.note-area:focus{outline:none;border-color:var(--primary);}
/* Main */
main{flex:1;padding:14px 18px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;}
/* Alert */
.alert-box{border-left:4px solid;padding:10px 14px;border-radius:6px;font-size:0.82rem;display:flex;flex-direction:column;gap:4px;}
.alert-title{font-weight:700;font-size:0.85rem;}
.alert-item{margin-left:12px;line-height:1.6;}
/* Tabs */
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);flex-wrap:wrap;}
.tab-btn{background:none;border:none;padding:8px 13px;cursor:pointer;font-size:0.85rem;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;white-space:nowrap;}
.tab-btn:hover{color:var(--primary);}
.tab-btn.active{color:var(--primary);font-weight:700;border-bottom-color:var(--primary);}
/* Card */
.card{background:var(--card);padding:14px 16px;border-radius:10px;border:1px solid var(--border);display:flex;flex-direction:column;gap:11px;}
/* Input */
.input-row{display:flex;flex-wrap:wrap;gap:7px;align-items:center;}
.input-row input[type="text"]{flex:1;min-width:160px;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:0.85rem;}
.input-row input[type="text"]:focus,.modal-box input:focus,.modal-box textarea:focus{outline:none;border-color:var(--primary);}
.input-row select,.input-row input[type="date"]{padding:6px 7px;border:1.5px solid var(--border);border-radius:6px;font-size:0.8rem;background:white;}
.date-grp{display:flex;align-items:center;gap:4px;font-size:0.78rem;color:var(--muted);}
.btn-primary{background:var(--primary);color:white;border:none;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:0.85rem;font-weight:600;white-space:nowrap;}
.btn-primary:hover{background:#4338ca;}
.btn-sm{border:none;padding:3px 8px;border-radius:5px;font-size:0.73rem;cursor:pointer;font-weight:600;}
.btn-cancel{background:var(--bg);border:1px solid var(--border);padding:7px 14px;border-radius:6px;cursor:pointer;font-size:0.85rem;}
/* Gantt */
.chart-header{display:flex;font-weight:700;font-size:0.78rem;color:var(--muted);border-bottom:2px solid var(--border);padding-bottom:5px;}
.chart-row{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);gap:8px;}
.chart-row:last-child{border-bottom:none;}
.chart-label{width:28%;font-size:0.8rem;padding-right:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chart-today-line{position:absolute;top:0;bottom:0;width:2px;background:#f59e0b;z-index:2;}
.chart-timeline{flex:1;background:#f1f5f9;height:21px;border-radius:4px;position:relative;}
.chart-bar{height:100%;border-radius:4px;position:absolute;display:flex;align-items:center;justify-content:center;color:white;font-size:0.67rem;font-weight:700;overflow:hidden;}
.bar-running{background:var(--primary);}
.bar-done{background:#94a3b8;}
.bar-early{background:var(--early);}
.bar-overdue{background:var(--warn);}
/* Task list */
.task-list{display:flex;flex-direction:column;gap:7px;}
.task-item{background:var(--card);padding:11px 13px;border-radius:8px;border:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:8px;transition:box-shadow .15s;}
.task-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.07);}
.task-item.completed{opacity:.7;}
.task-item.completed .task-text{text-decoration:line-through;color:var(--muted);}
.task-item.overdue{border-left:3px solid var(--warn);}
.task-left{display:flex;flex-wrap:wrap;align-items:center;gap:7px;flex:1;}
.task-right{display:flex;align-items:center;gap:5px;flex-shrink:0;}
/* drag */
.drag-handle{cursor:grab;color:#cbd5e1;font-size:0.85rem;padding:0 3px;user-select:none;flex-shrink:0;}
.drag-handle:hover{color:var(--muted);}
.drag-handle:active{cursor:grabbing;}
.task-item.dragging{opacity:.4;border:2px dashed var(--primary);}
.task-item.drag-over{border-top:3px solid var(--primary);}
.project-item.dragging{opacity:.35;}
.project-item.drag-over{border-top:2px solid var(--primary);}
.prio-group-label{font-size:0.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:4px 2px 2px;margin-top:4px;}
.p-badge{font-size:0.7rem;padding:2px 6px;border-radius:4px;font-weight:600;}
.date-badge{font-size:0.7rem;color:var(--muted);background:#f8fafc;padding:2px 6px;border-radius:4px;border:1px solid var(--border);}
.status-chip{font-size:0.68rem;padding:2px 6px;border-radius:10px;color:white;font-weight:700;}
/* Calendar */
.cal-nav{display:flex;justify-content:space-between;align-items:center;}
.cal-title-wrap{text-align:center;}
.cal-title{font-weight:700;font-size:1rem;}
.cal-weeknum{font-size:0.72rem;color:var(--muted);margin-top:1px;}
.cal-nav-btn{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 11px;cursor:pointer;font-size:0.82rem;}
.cal-nav-btn:hover{background:var(--border);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-head{text-align:center;font-size:0.7rem;font-weight:700;color:var(--muted);padding:3px 0;}
.cal-cell{min-height:74px;border:1px solid var(--border);border-radius:4px;padding:3px 4px;background:white;overflow:hidden;}
.cal-cell.other{background:#f8fafc;}
.cal-cell.today-cell{background:#fffbeb;border-color:#f59e0b;}
.cal-day{font-size:0.73rem;font-weight:700;margin-bottom:2px;}
.today-num{display:inline-flex;align-items:center;justify-content:center;background:#f59e0b;color:white;border-radius:50%;width:17px;height:17px;font-size:0.7rem;}
.chip{font-size:0.61rem;border-radius:3px;padding:1px 3px;margin-bottom:2px;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;line-height:1.4;}
.chip.run{background:var(--primary);}
.chip.done{background:#94a3b8;}
.chip.erly{background:var(--early);}
.chip.due{background:var(--warn);}
/* Progress */
.prog-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.prog-card{background:var(--bg);border-radius:8px;padding:12px 14px;border-left:4px solid;}
.prog-card .big{font-size:1.7rem;font-weight:800;}
.prog-card .sm{font-size:0.73rem;color:var(--muted);margin-top:1px;}
.prog-bar-wrap{margin-bottom:12px;}
.prog-bar-label{display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:4px;}
.prog-bar-track{background:#f1f5f9;border-radius:20px;height:10px;overflow:hidden;}
.prog-bar-fill{height:100%;border-radius:20px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.donut-wrap{display:flex;align-items:center;justify-content:center;position:relative;width:120px;height:120px;margin:0 auto;}
.donut-wrap canvas{position:absolute;}
.donut-center{text-align:center;position:relative;z-index:1;}
.donut-pct{font-size:1.4rem;font-weight:800;color:var(--primary);}
.donut-lbl{font-size:0.66rem;color:var(--muted);}
/* Weekly */
.week-selector{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.week-tab{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:0.8rem;color:var(--muted);transition:.15s;white-space:nowrap;}
.week-tab.active{background:var(--primary);color:white;border-color:var(--primary);font-weight:600;}
.week-tab:hover:not(.active){border-color:var(--primary);color:var(--primary);}
.week-bar-row{display:flex;align-items:center;gap:8px;font-size:0.78rem;margin-bottom:6px;}
.week-bar-name{width:100px;text-align:right;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.week-bar-track{flex:1;background:#f1f5f9;border-radius:10px;height:10px;}
.week-bar-fill{height:100%;border-radius:10px;}
.week-bar-val{width:40px;color:var(--muted);font-size:0.73rem;}
.wlog-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:0.83rem;}
.wlog-item:last-child{border-bottom:none;}
/* Legend */
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:0.73rem;color:var(--muted);}
.legend span{display:flex;align-items:center;gap:4px;}
.legend-dot{width:9px;height:9px;border-radius:3px;}
/* 색상 팔레트 */
.color-palette{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-top:4px;}
.color-swatch{width:28px;height:28px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:.15s;}
.color-swatch:hover{transform:scale(1.15);}
.color-swatch.selected{border-color:var(--text);transform:scale(1.1);}
/* 프로젝트 노트 패널 */
.proj-note-panel{background:var(--card);border-left:1px solid var(--border);width:0;overflow:hidden;transition:width .25s;flex-shrink:0;display:flex;flex-direction:column;}
.proj-note-panel.open{width:260px;}
.proj-note-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.proj-note-body{padding:12px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;flex:1;}
.proj-note-ta{border:1.5px solid var(--border);border-radius:6px;padding:8px;font-size:0.82rem;resize:vertical;min-height:80px;font-family:inherit;width:100%;}
.proj-note-ta:focus{outline:none;border-color:var(--primary);}
.proj-sched-item{display:flex;align-items:center;gap:6px;font-size:0.8rem;padding:5px 0;border-bottom:1px solid var(--border);}
.proj-sched-item:last-child{border-bottom:none;}
/* 상태 뱃지 */
.status-select{font-size:0.72rem;border:1.5px solid var(--border);border-radius:5px;padding:2px 5px;cursor:pointer;font-weight:600;}
/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
.modal.open{display:flex;}
.modal-box{background:white;border-radius:12px;padding:22px;width:380px;max-width:95vw;display:flex;flex-direction:column;gap:12px;max-height:90vh;overflow-y:auto;}
.modal-box h3{font-size:1rem;font-weight:700;}
.modal-box input,.modal-box select,.modal-box textarea{padding:8px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:0.85rem;width:100%;font-family:inherit;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;}
/* Week heatmap */
.heat-row{display:flex;gap:3px;align-items:center;font-size:0.75rem;margin-bottom:3px;}
.heat-cell{width:20px;height:20px;border-radius:3px;border:1px solid var(--border);}
@media(max-width:768px){
  aside{width:100%;border-right:none;border-bottom:1px solid var(--border);}
  .prog-cards{grid-template-columns:repeat(2,1fr);}
  .week-selector{overflow-x:auto;}
}
</style>
<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<header>
  <h1>📔 석원이의 업무 다이어리</h1>
  <div class="hdr-right">
    <span class="week-badge" id="hdr-week">W?</span>
    <span class="score-badge">효율 <span id="efficiency-score">0</span>%</span>
  </div>
</header>

<div class="container">
  <aside id="sidebar">
    <div class="sidebar-resizer" id="sidebar-resizer"></div>
    <h3>📁 프로젝트</h3>
    <div id="project-list"></div>
    <button class="add-proj-btn" onclick="openModal_proj_add()">+ 프로젝트 추가</button>
    <div class="sidebar-note">
      <h3 style="margin-top:0;">📝 메모</h3>
      <textarea class="note-area" id="sidebar-note" placeholder="간단한 메모를 남겨보세요..."></textarea>
    </div>
  </aside>
  <!-- 프로젝트 노트 패널 -->
  <div class="proj-note-panel" id="proj-note-panel">
    <div class="proj-note-header">
      <span id="proj-note-title" style="font-weight:700;font-size:0.9rem;flex:1"></span>
      <button onclick="closeProjNote()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;">✕</button>
    </div>
    <div class="proj-note-body">
      <div style="font-size:0.78rem;font-weight:700;color:var(--muted);">📝 프로젝트 노트</div>
      <textarea class="proj-note-ta" id="proj-note-ta" placeholder="프로젝트 관련 메모, 목표, 이슈 등을 기록하세요..."></textarea>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:0.78rem;font-weight:700;color:var(--muted);">📅 주요 일정</span>
        <button onclick="toggleSchedForm()" class="btn-sm" style="background:var(--pri-light);color:var(--primary);">+ 추가</button>
      </div>
      <div id="sched-form" style="display:none;flex-direction:column;gap:6px;background:var(--bg);border-radius:6px;padding:8px;">
        <input type="date" id="sched-date-input" style="padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:0.82rem;width:100%;">
        <input type="text" id="sched-text-input" placeholder="일정 내용" style="padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:0.82rem;width:100%;">
        <div style="display:flex;gap:6px;justify-content:flex-end;">
          <button onclick="toggleSchedForm()" class="btn-cancel" style="font-size:0.78rem;padding:4px 10px;">취소</button>
          <button onclick="addProjSched()" class="btn-primary" style="font-size:0.78rem;padding:4px 10px;">저장</button>
        </div>
      </div>
      <div id="proj-sched-list"></div>
    </div>
  </div>

  <main>
    <div class="alert-box" id="alert-section" style="display:none;">
      <div class="alert-title" id="alert-title">⚠️ 장기 미활동 프로젝트</div>
      <div id="alert-list"></div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('today',this)">📋 할 일 &amp; 간트</button>
      <button class="tab-btn" onclick="switchTab('calendar',this)">📅 캘린더</button>
      <button class="tab-btn" onclick="switchTab('progress',this)">📊 진행 현황</button>
      <button class="tab-btn" onclick="switchTab('weekly',this)">⏱️ 주간 기록</button>
      <button class="tab-btn" onclick="switchTab('history',this)">📂 완료 히스토리</button>
      <button class="tab-btn" onclick="switchTab('trash',this)">🗑️ 휴지통 <span id="trash-badge" style="display:none;background:var(--warn);color:white;font-size:0.65rem;border-radius:10px;padding:1px 5px;margin-left:2px;"></span></button>
    </div>

    <!-- 할 일 & 간트 -->
    <div id="tab-today">
      <div class="card" style="margin-bottom:11px;">
        <strong id="gantt-title">📅 월간 타임라인</strong>
        <div class="chart-header">
          <div style="width:28%">업무명</div>
          <div style="flex:1;position:relative;height:18px;font-size:0.7rem;color:var(--muted);">
            <span id="g-d1" style="position:absolute;left:0;transform:translateX(0)"></span>
            <span id="g-d2" style="position:absolute;transform:translateX(-50%)"></span>
            <span id="g-d3" style="position:absolute;transform:translateX(-50%)"></span>
            <span id="g-d4" style="position:absolute;right:0;text-align:right;"></span>
          </div>
        </div>
        <div id="chart-rows"></div>
        <div class="legend">
          <span><span class="legend-dot" style="background:var(--primary)"></span>진행중</span>
          <span><span class="legend-dot" style="background:var(--early)"></span>조기완료</span>
          <span><span class="legend-dot" style="background:#94a3b8"></span>완료</span>
          <span><span class="legend-dot" style="background:var(--warn)"></span>기한초과</span>
          <span><span style="display:inline-block;width:2px;height:9px;background:#f59e0b;border-radius:1px"></span>오늘</span>
        </div>
      </div>
      <div class="card" style="margin-bottom:11px;">
        <div class="input-row">
          <input type="text" id="task-input" placeholder="새 업무 입력...">
          <select id="project-select"></select>
          <select id="task-priority" style="padding:6px 7px;border:1.5px solid var(--border);border-radius:6px;font-size:0.8rem;background:white;font-weight:700;">
            <option value="A1" style="color:#ef4444">A1</option><option value="A2" style="color:#ef4444">A2</option><option value="A3" style="color:#ef4444">A3</option>
            <option value="B1" style="color:#f59e0b">B1</option><option value="B2" style="color:#f59e0b" selected>B2</option><option value="B3" style="color:#f59e0b">B3</option>
            <option value="C1" style="color:#10b981">C1</option><option value="C2" style="color:#10b981">C2</option><option value="C3" style="color:#10b981">C3</option>
          </select>
          <div class="date-grp"><label>시작</label><input type="date" id="start-date"></div>
          <div class="date-grp"><label>종료</label><input type="date" id="end-date"></div>
          <button class="btn-primary" onclick="addTask()">추가</button>
        </div>
      </div>
      <div class="task-list" id="task-list"></div>
    </div>

    <!-- 캘린더 -->
    <div id="tab-calendar" style="display:none;">
      <div class="card">
        <div class="cal-nav">
          <button class="cal-nav-btn" onclick="calMove(-1)">◀</button>
          <div class="cal-title-wrap">
            <div class="cal-title" id="cal-title"></div>
            <div class="cal-weeknum" id="cal-weeknum"></div>
          </div>
          <button class="cal-nav-btn" onclick="calMove(1)">▶</button>
        </div>
        <div class="cal-grid" id="cal-head-row"></div>
        <div class="cal-grid" id="cal-body"></div>
        <div class="legend">
          <span><span class="legend-dot" style="background:var(--primary)"></span>진행중</span>
          <span><span class="legend-dot" style="background:var(--early)"></span>조기완료</span>

}

// 경과율 계산: 시작일~종료일 중 오늘이 몇%인지
function getTimeElapsedPct(t){
  const todayD=new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate());
  const s=new Date(t.start); const sD=new Date(s.getFullYear(),s.getMonth(),s.getDate());
  const e=new Date(t.end);   const eD=new Date(e.getFullYear(),e.getMonth(),e.getDate());
  const total=eD-sD; if(total<=0) return 100;
  const elapsed=todayD-sD;
  return Math.min(100,Math.max(0,Math.round(elapsed/total*100)));
}

// 건강도: 진행% - 경과% → 양수=순조, 음수=지연
function getHealthScore(t){
  if(t.done) return 100;
  const prog=getTaskProgress(t);

}

  const t=Math.min(1,Math.max(0,(score+30)/50)); // 0~1
  const r=Math.round(239+(16-239)*t);
  const g=Math.round(68+(185-68)*t);
  const b=Math.round(68+(129-68)*t);
  return `rgb(${r},${g},${b})`;
}

/* ISO week number */
function getISOWeek(date){
  const dt = new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));
  const day = dt.getUTCDay()||7;
  dt.setUTCDate(dt.getUTCDate()+4-day);
  const yearStart = new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  return {year:dt.getUTCFullYear(), week:Math.ceil((((dt-yearStart)/86400000)+1)/7)};
}
function isoWeekKey(dateStr){
  const {year,week} = getISOWeek(new Date(dateStr));
  return `${year}-W${String(week).padStart(2,'0')}`;
}
function weekLabel(key){
  const [y,wStr] = key.split('-W');
  const week = parseInt(wStr);
  // find Monday of that ISO week
  const jan4 = new Date(Date.UTC(parseInt(y),0,4));
  const mon = new Date(jan4);
  mon.setUTCDate(jan4.getUTCDate()-((jan4.getUTCDay()||7)-1)+(week-1)*7);
  const sun = new Date(mon); sun.setUTCDate(mon.getUTCDate()+6);
  const f = dt => `${dt.getUTCMonth()+1}/${dt.getUTCDate()}`;
  return `W${week} (${f(mon)}~${f(sun)})`;
}
function weekMonday(key){
  const [y,wStr]=key.split('-W'); const week=parseInt(wStr);
  const jan4=new Date(Date.UTC(parseInt(y),0,4));
  const mon=new Date(jan4);
  mon.setUTCDate(jan4.getUTCDate()-((jan4.getUTCDay()||7)-1)+(week-1)*7);
  return mon;
}

  const r = Math.round(254 + (127-254)*t);
  const g = Math.round(202 + (29-202)*t);
  const b = Math.round(202 + (29-202)*t);
  return `rgb(${r},${g},${b})`;
}

      <span onclick="openProjNote('${p.id}')" title="프로젝트 노트/일정" style="color:${iconCol};font-size:0.72rem;cursor:pointer;padding:2px 3px;flex-shrink:0;line-height:1;" onmouseover="this.style.color='#f59e0b'" onmouseout="this.style.color='${iconCol}'">📋</span>
      <span onclick="openEditProject('${p.id}')" title="이름 수정" style="color:${iconCol};font-size:0.75rem;cursor:pointer;padding:2px 3px;flex-shrink:0;line-height:1;" onmouseover="this.style.color='#a5b4fc'" onmouseout="this.style.color='${iconCol}'">✏</span>
      <span onclick="completeProject('${p.id}')" title="완료 처리 → 히스토리" style="color:${iconCol};font-size:0.72rem;cursor:pointer;padding:2px 3px;flex-shrink:0;line-height:1;" onmouseover="this.style.color='#10b981'" onmouseout="this.style.color='${iconCol}'">✔</span>
      <span onclick="deleteProject('${p.id}')" title="휴지통으로 이동" style="color:${iconCol};font-size:0.85rem;cursor:pointer;padding:2px 3px;flex-shrink:0;line-height:1;" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='${iconCol}'">&times;</span>
    </div>`;
  });
  el.innerHTML = html;

  // sync selects
  ['project-select','edit-project','w-project'].forEach(id=>{
    const sel = document.getElementById(id); if(!sel) return;
    const cur = sel.value;
    sel.innerHTML = projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
    if(projects.find(p=>p.id===cur)) sel.value=cur;
  });
  if(currentFilter!=='all'){
    const s=document.getElementById('project-select');
    if(s) s.value=currentFilter;
  }
}

function setFilter(id){ currentFilter=id; render(); }

/* ══════════════════════════════════════
   ALERT (gradient inactivity)
══════════════════════════════════════ */
function checkAlerts(){
  const listEl = document.getElementById('alert-list');
  const box    = document.getElementById('alert-section');
  listEl.innerHTML='';
  let items=[];
  projects.forEach(p=>{
    const days = inactiveDays(p);
    if(days>=14){
      const ic = inactiveColor(days);
      const intensity = Math.min(1,(days-14)/(70-14));
      const borderColor = ic;
      // text color: dark if intense
      const textColor = intensity>0.5 ? '#7f1d1d' : '#991b1b';
      items.push({p,days,borderColor,textColor});
    }
  });
  if(!items.length){ box.style.display='none'; return; }
  // pick strongest for border
  const strongest = items.reduce((a,b)=>b.days>a.days?b:a);
  box.style.borderLeftColor = strongest.borderColor;
  box.style.background = `${strongest.borderColor}18`;
  document.getElementById('alert-title').style.color = strongest.textColor;
  items.forEach(({p,days,textColor})=>{
    listEl.innerHTML+=`<div class="alert-item" style="color:${textColor}">
      🛑 <strong>[${p.name}]</strong> ${days}일간 활동 없음 (마지막: ${p.lastAction})</div>`;
  });
  box.style.display='flex';
}

/* ══════════════════════════════════════
   GANTT
══════════════════════════════════════ */
function renderGantt(list){
  const container = document.getElementById('chart-rows');
  container.innerHTML='';

  // 오늘 기준 -15일 ~ +15일 (시간 제거해서 날짜만 비교)
  const todayD = new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate());
  const mStart = new Date(todayD); mStart.setDate(todayD.getDate()-15);
  const mEnd   = new Date(todayD); mEnd.setDate(todayD.getDate()+15);
  const mDur   = mEnd.getTime()-mStart.getTime();

  const fmtD = dt => `${dt.getMonth()+1}/${dt.getDate()}`;
  const q1 = new Date(mStart); q1.setDate(mStart.getDate()+8);

  // q1: 25% 위치 날짜
  const q1Date = new Date(mStart); q1Date.setDate(mStart.getDate()+Math.round(30*0.25));

  // 오늘 위치 정확히 계산 (날짜 기준)
  const todayPct = ((todayD.getTime()-mStart.getTime())/mDur)*100;

  document.getElementById('gantt-title').textContent=`📅 타임라인 (${fmtD(mStart)} ~ ${fmtD(mEnd)})`;

  // 라벨 텍스트 + 위치를 % 로 정확히 설정
  const g1=document.getElementById('g-d1');
  const g2=document.getElementById('g-d2');
  const g3=document.getElementById('g-d3');
  const g4=document.getElementById('g-d4');
  g1.textContent=fmtD(mStart);  g1.style.left='0%';
  g2.textContent=fmtD(q1Date);  g2.style.left='25%';
  g3.textContent=`▼오늘(${fmtD(todayD)})`; g3.style.left=todayPct+'%'; g3.style.color='#f59e0b'; g3.style.fontWeight='700';
  g4.textContent=fmtD(mEnd);    g4.style.left=''; g4.style.right='0';

  if(!list.length){ container.innerHTML='<div style="color:var(--muted);font-size:0.82rem;padding:10px 0">표시할 업무가 없습니다.</div>'; return; }
  list.sort(prioSort).forEach(t=>{
    // 날짜만 비교 (시간 제거)
    const sd=d(t.start); const sD=new Date(sd.getFullYear(),sd.getMonth(),sd.getDate());
    const ed=d(t.done&&t.actualEnd?t.actualEnd:t.end); const eD=new Date(ed.getFullYear(),ed.getMonth(),ed.getDate());
    const s=sD.getTime(), eChart=eD.getTime();
    let left=Math.max(0,((s-mStart.getTime())/mDur)*100);
    let width=Math.min(100-left,((eChart-s)/mDur)*100);
    if(width<=0) width=3;
    const st2=getTaskStatus(t);
    const prio=t.priority||'';
    const pc=prioColor(prio);
    const progPct=getTaskProgress(t);
    const health=!t.done?getHealthScore(t):0;
    const hCol=t.done?'#94a3b8':healthColor(health);

    // 바 배경: 항상 연한 회색, 채움: 진행% 만큼 건강도 색상
    let barLabel='미진행'; let barBg='#e2e8f0';
    if(t.done){ barLabel=isEarly(t)?'⚡ 조기':'✓ 완료'; barBg='#94a3b8'; }
    else if(isOverdue(t)){ barLabel='🔴 초과'; barBg='#ef4444'; }
    else if(st2==='delayed'){ barLabel='⚠ 지연'; }
    else if(st2==='on_track'){ barLabel='✅ 순조'; }
    else if(st2.startsWith('in_progress')){ barLabel=progPct+'%'; }

    const row=document.createElement('div');
    row.className='chart-row';
    row.innerHTML=`<div class="chart-label" title="${t.text}">
        ${prio?`<span style="background:${pc};color:white;font-size:0.65rem;font-weight:800;padding:1px 5px;border-radius:3px;margin-right:4px;">${prio}</span>`:''}${t.text}
      </div>
      <div class="chart-timeline" title="${t.text}: ${barLabel}">
        <div class="chart-today-line" style="left:${todayPct}%"></div>
        <!-- 바 전체 배경 (기간) -->
        <div style="position:absolute;left:${left}%;width:${width}%;height:100%;background:#e2e8f0;border-radius:4px;overflow:hidden;">
          <!-- 진행% 채움 -->
          <div style="height:100%;width:${t.done?100:progPct}%;background:${hCol};transition:width .4s;display:flex;align-items:center;justify-content:center;min-width:${barLabel?'auto':'0'};">
          </div>
          <!-- 라벨 (중앙 고정) -->
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:${progPct>40||t.done?'white':'#334155'};font-size:0.67rem;font-weight:700;pointer-events:none;">
            ${barLabel}
          </div>
        </div>
      </div>`;
    container.appendChild(row);
  });
}

/* ══════════════════════════════════════
   TASK LIST
══════════════════════════════════════ */
function renderTaskList(list){
  const el=document.getElementById('task-list');
  el.innerHTML='';
  if(!list.length){ el.innerHTML='<div style="color:var(--muted);font-size:0.83rem;text-align:center;padding:18px">업무 없음. 위에서 추가하세요.</div>'; return; }

  // 우선순위 그룹별로 묶기 (같은 priority끼리 subOrder로 순서 유지)
  const sorted=[...list].sort((a,b)=>{
    const ai=PRIORITY_ORDER.indexOf(a.priority||'C3');
    const bi=PRIORITY_ORDER.indexOf(b.priority||'C3');
    if(ai!==bi) return (ai<0?99:ai)-(bi<0?99:bi);
    return (a.subOrder||0)-(b.subOrder||0);
  });

  let lastPrio=null;
  sorted.forEach(t=>{
    const prio=t.priority||'';
    // 그룹 라벨
    if(prio && prio!==lastPrio){
      const lbl=document.createElement('div');
      lbl.className='prio-group-label';
      const groupColor=prioColor(prio);
      lbl.innerHTML=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${groupColor};margin-right:4px;vertical-align:middle;"></span>${prio[0]==='A'?'긴급':prio[0]==='B'?'중요':'일반'} (${prio[0]})`;
      el.appendChild(lbl);
      lastPrio=prio;
    }
    const p=proj(t.project), over=isOverdue(t), erly=isEarly(t);
    const pc=prioColor(prio);
    const item=document.createElement('div');
    item.className=`task-item ${t.done?'completed':''} ${over?'overdue':''}`;
    item.setAttribute('draggable','true');
    item.setAttribute('data-tid', t.id);
    item.setAttribute('data-prio', prio);
    const st=getTaskStatus(t);
    const stInfo=TASK_STATUS[st]||TASK_STATUS['not_started'];
    item.innerHTML=`
      <span class="drag-handle" title="같은 우선순위 내 순서 변경">⠿</span>
      <div class="task-left">
        <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask(${t.id})">
        ${prio?`<span style="background:${pc};color:white;font-size:0.7rem;font-weight:800;padding:2px 6px;border-radius:4px;min-width:26px;text-align:center">${prio}</span>`:''}
        <span class="p-badge" style="background:${p.color}22;color:${p.color}">${p.name}</span>
        <span class="task-text" style="font-size:0.85rem">${t.text}</span>
        <span class="date-badge">📅 ${fmt(t.start)} ~ ${fmt(t.end)}</span>
        ${!t.done?`<select class="status-select" style="color:${stInfo.color};border-color:${stInfo.color}22;background:${stInfo.color}11"
            onchange="setTaskStatus(${t.id},this.value)">
          ${Object.entries(TASK_STATUS).filter(([k])=>k!=='done'&&k!=='early_done'&&k!=='overdue').map(([k,v])=>`<option value="${k}" ${st===k?'selected':''}>${v.icon} ${v.label}</option>`).join('')}
        </select>`:`<span class="status-chip" style="background:${stInfo.color}">${stInfo.icon} ${stInfo.label}</span>`}
      </div>
      <div class="task-right">
        ${!t.done?`<button class="btn-sm" style="background:var(--accent);color:white" onclick="completeEarly(${t.id})">조기완료</button>`:''}
        <button class="btn-sm" style="background:var(--pri-light);color:var(--primary)" onclick="openEdit(${t.id})">수정</button>
        <button class="btn-sm" style="background:#fee2e2;color:var(--warn)" onclick="deleteTask(${t.id})">삭제</button>
      </div>`;
    // task drag events
    item.addEventListener('dragstart', e=>taskDragStart(e, t.id, prio));
    item.addEventListener('dragover',  e=>taskDragOver(e, prio));
    item.addEventListener('dragleave', e=>e.currentTarget.classList.remove('drag-over'));
    item.addEventListener('drop',      e=>taskDrop(e, t.id, prio));
    item.addEventListener('dragend',   e=>e.currentTarget.classList.remove('dragging'));
    el.appendChild(item);
  });
}

/* ══════════════════════════════════════
   CALENDAR
══════════════════════════════════════ */
function renderCalendar(){
  document.getElementById('cal-title').textContent=`${calYear}년 ${calMonth+1}월`;
  // show ISO week range of this month
  const firstOfMonth=new Date(calYear,calMonth,1);
  const lastOfMonth=new Date(calYear,calMonth+1,0);
  const w1=getISOWeek(firstOfMonth), w2=getISOWeek(lastOfMonth);
  document.getElementById('cal-weeknum').textContent=`W${w1.week} ~ W${w2.week}`;

  const days=['일','월','화','수','목','금','토'];
  document.getElementById('cal-head-row').innerHTML=days.map(d=>`<div class="cal-head">${d}</div>`).join('');

  const first=new Date(calYear,calMonth,1).getDay();
  const last=new Date(calYear,calMonth+1,0).getDate();
  const prevLast=new Date(calYear,calMonth,0).getDate();
  const ft=filteredTasks();
  let html='';
  for(let i=0;i<first;i++) html+=`<div class="cal-cell other"><div class="cal-day" style="color:#cbd5e1">${prevLast-first+1+i}</div></div>`;
  for(let day=1;day<=last;day++){
    const cellDate=new Date(calYear,calMonth,day);
    const isToday=cellDate.toDateString()===TODAY.toDateString();
    const {week}=getISOWeek(cellDate);
    const chips=[];
    ft.forEach(t=>{
      const s=d(t.start), e=t.actualEnd?d(t.actualEnd):d(t.end);
      const sd=new Date(s.getFullYear(),s.getMonth(),s.getDate());
      const ed=new Date(e.getFullYear(),e.getMonth(),e.getDate());
      if(cellDate>=sd&&cellDate<=ed){
        const over=isOverdue(t), erly=isEarly(t);
        const cls=t.done?(erly?'erly':'done'):(over?'due':'run');
        const isStart=cellDate.toDateString()===sd.toDateString();
        chips.push(`<span class="chip ${cls}" title="${t.text}">${isStart?'▶ ':''}${t.text}</span>`);
      }
    });
    // show week number on Mondays
    const isMonday=cellDate.getDay()===1;
    html+=`<div class="cal-cell ${isToday?'today-cell':''}">
      <div class="cal-day" style="display:flex;align-items:center;gap:3px;">
        ${isToday?`<span class="today-num">${day}</span>`:day}
        ${isMonday?`<span style="font-size:0.58rem;color:var(--muted);font-weight:400">W${week}</span>`:''}
      </div>
      ${chips.join('')}</div>`;
  }
  const rem=(first+last)%7;
  if(rem) for(let i=1;i<=7-rem;i++) html+=`<div class="cal-cell other"><div class="cal-day" style="color:#cbd5e1">${i}</div></div>`;
  document.getElementById('cal-body').innerHTML=html;
}
function calMove(dir){ calMonth+=dir; if(calMonth>11){calMonth=0;calYear++;}else if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }

/* ══════════════════════════════════════
   PROGRESS
══════════════════════════════════════ */
function renderProgress(){
  const ft=filteredTasks();
  const total=ft.length;
  const done=ft.filter(t=>t.done).length;

  // 전체 평균 진행률 = 각 업무의 진행% 평균 (완료=100, 진행중=10~90, 미진행=0)
  const avgPct=total?Math.round(ft.reduce((s,t)=>s+getTaskProgress(t),0)/total):0;
  const donePct=total?Math.round(done/total*100):0;

  // 도넛: 평균 진행률 기준
  document.getElementById('donut-pct').textContent=avgPct+'%';
  const canvas=document.getElementById('donut-canvas');
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,120,120);
  const cx=60,cy=60,r=44,lw=16;
  // 배경
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.strokeStyle='#e2e8f0'; ctx.lineWidth=lw; ctx.stroke();
  // 완료% (진한 초록)
  if(donePct>0){
    ctx.beginPath(); ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+(Math.PI*2*donePct/100));
    ctx.strokeStyle='#10b981'; ctx.lineWidth=lw; ctx.lineCap='round'; ctx.stroke();
  }
  // 진행중 포함 평균% (연한 파랑, 완료 위에 덧그리기)
  if(avgPct>donePct){
    ctx.beginPath(); ctx.arc(cx,cy,r,-Math.PI/2+(Math.PI*2*donePct/100),-Math.PI/2+(Math.PI*2*avgPct/100));
    ctx.strokeStyle='#818cf8'; ctx.lineWidth=lw; ctx.lineCap='round'; ctx.stroke();
  }

  // 프로젝트별 바
  const bEl=document.getElementById('project-bars');
  bEl.innerHTML='';
  projects.forEach(p=>{
    const pt=tasks.filter(t=>t.project===p.id);
    if(!pt.length) return;
    const pd=pt.filter(t=>t.done).length;
    // 평균 진행률 (완료=100% 포함)
    const avgProgPct=Math.round(pt.reduce((s,t)=>s+getTaskProgress(t),0)/pt.length);
    const donePctP=Math.round(pd/pt.length*100);
    const hDiff=avgProgPct-getTimeElapsedPct({start:pt[0].start,end:pt[pt.length-1].end,done:false});
    const hCol=healthColor(
      Math.round(pt.filter(t=>!t.done).reduce((s,t)=>s+getHealthScore(t),0)/Math.max(1,pt.filter(t=>!t.done).length))
    );
    bEl.innerHTML+=`<div class="prog-bar-wrap">
      <div class="prog-bar-label">
        <span style="font-weight:600">${p.name}</span>
        <span style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:0.72rem;color:var(--muted);">완료 ${pd}/${pt.length}건</span>
          <span style="color:${p.color};font-weight:700;">${avgProgPct}%</span>
        </span>
      </div>
      <div class="prog-bar-track" style="height:14px;position:relative;">
        <!-- 평균 진행률 (연한색) -->
        <div style="position:absolute;height:100%;width:${avgProgPct}%;background:${p.color};opacity:0.25;border-radius:20px;"></div>
        <!-- 완료 (진한색) -->
        <div style="position:absolute;height:100%;width:${donePctP}%;background:${p.color};border-radius:20px;transition:width .6s;"></div>
        <!-- 라벨 -->
        <div style="position:absolute;inset:0;display:flex;align-items:center;padding:0 8px;justify-content:space-between;pointer-events:none;">
          <span style="font-size:0.65rem;color:${donePctP>30?'white':'var(--text)'};font-weight:700;">${donePctP>0?'완료 '+donePctP+'%':''}</span>
          <span style="font-size:0.65rem;color:var(--muted);font-weight:700;">${avgProgPct>donePctP?'진행포함 '+avgProgPct+'%':''}</span>
        </div>
      </div>
    </div>`;
  });

  const overdue=ft.filter(t=>isOverdue(t)).length;
  const inprog=ft.filter(t=>!t.done&&!isOverdue(t)).length;
  const early=ft.filter(t=>isEarly(t)).length;
  const activeTasks=ft.filter(t=>!t.done&&!isOverdue(t));
  const avgHealth=activeTasks.length?Math.round(activeTasks.reduce((s,t)=>s+getHealthScore(t),0)/activeTasks.length):0;
  const hCol=healthColor(avgHealth);
  document.getElementById('stat-cards').innerHTML=`
    <div class="prog-card" style="border-color:#10b981">
      <div class="big" style="color:#10b981">${donePct}%</div>
      <div class="sm">✅ 완료율 (${done}/${total})</div>
    </div>
    <div class="prog-card" style="border-color:#818cf8">
      <div class="big" style="color:#818cf8">${avgPct}%</div>
      <div class="sm">📊 평균 진행률</div>
      <div style="font-size:0.7rem;color:var(--muted);margin-top:2px;">완료+진행중 반영</div>
    </div>
    <div class="prog-card" style="border-color:${hCol}">
      <div class="big" style="color:${hCol}">${avgHealth>0?'+':''}${avgHealth}%</div>
      <div class="sm">${avgHealth>=0?'✅ 전체 건강도':'⚠️ 전체 건강도'}</div>
    </div>
    <div class="prog-card" style="border-color:var(--warn)">
      <div class="big" style="color:var(--warn)">${overdue}</div>
      <div class="sm">🔴 기한초과</div>
    </div>`;
}

/* ══════════════════════════════════════
   WEEKLY (누적 주차 뷰)
══════════════════════════════════════ */
function getWeekKeys(){
  const keys=new Set();
  weeklyLogs.forEach(l=>keys.add(isoWeekKey(l.date)));
  // also add current week
  keys.add(isoWeekKey(TODAY_STR));
  return [...keys].sort().reverse(); // newest first
}

function renderWeekSelector(){
  const keys=getWeekKeys();
  if(!selectedWeekKey || !keys.includes(selectedWeekKey)) selectedWeekKey=keys[0]||null;
  const {week:curWeek}=getISOWeek(TODAY);
  document.getElementById('week-selector').innerHTML=keys.map(k=>{
    const {week,year}=(() =>{ const[y,w]=k.split('-W'); return{week:parseInt(w),year:parseInt(y)}; })();
    const isCur = k===isoWeekKey(TODAY_STR);
    return `<button class="week-tab ${k===selectedWeekKey?'active':''}" onclick="selectWeek('${k}')">
      ${isCur?'이번 주 · ':''}W${week}${isCur?'':` (${year})`}</button>`;
  }).join('');
}

function selectWeek(key){ selectedWeekKey=key; renderWeekly(); }

function renderWeekly(){
  renderWeekSelector();
  if(!selectedWeekKey){ document.getElementById('weekly-summary').innerHTML=''; document.getElementById('weekly-log').innerHTML=''; return; }

  const logs=(currentFilter==='all'?weeklyLogs:weeklyLogs.filter(l=>l.project===currentFilter))
    .filter(l=>isoWeekKey(l.date)===selectedWeekKey);

  // 프로젝트별 합산
  const byProj={};
  projects.forEach(p=>byProj[p.id]=0);
  logs.forEach(l=>{ if(byProj[l.project]!==undefined) byProj[l.project]+=l.hours; });
  const totalH=logs.reduce((s,l)=>s+l.hours,0);
  const maxH=Math.max(1,...Object.values(byProj));

  const {week}=(() =>{ const[y,w]=selectedWeekKey.split('-W'); return{week:parseInt(w)}; })();
  const wLabel=weekLabel(selectedWeekKey);

  // 날짜별 합산 (Mon~Sun of selected week)
  const mon = weekMonday(selectedWeekKey);
  const dayNames=['월','화','수','목','금','토','일'];
  const dayKeys=Array.from({length:7},(_,i)=>{
    const dt=new Date(mon); dt.setUTCDate(mon.getUTCDate()+i);
    return dt.toISOString().slice(0,10);
  });
  const byDay={}; dayKeys.forEach(k=>byDay[k]={h:0,logs:[]});
  logs.forEach(l=>{ if(byDay[l.date]){ byDay[l.date].h+=l.hours; byDay[l.date].logs.push(l); }});
  const maxDayH=Math.max(1,...dayKeys.map(k=>byDay[k].h));

  // 날짜별 바 차트 빌드
  const dayBarHTML=dayKeys.map((k,i)=>{
    const h=byDay[k].h;
    const dayLogs=byDay[k].logs;
    const isToday=k===TODAY_STR;
    const pct=((h/maxDayH)*100).toFixed(1);
    // 프로젝트별 색상 스택 (비율로)
    let stackHTML='';
    if(h>0){
      const projH={};
      dayLogs.forEach(l=>{ projH[l.project]=(projH[l.project]||0)+l.hours; });
      let cum=0;
      Object.entries(projH).forEach(([pid,ph])=>{
        const pw=(ph/h*100).toFixed(1);
        const pc=proj(pid).color;
        stackHTML+=`<div style="height:100%;width:${pw}%;background:${pc};"></div>`;
        cum+=ph;
      });
    }
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;">
      <div style="font-size:0.7rem;color:${isToday?'var(--primary)':'var(--muted)'};font-weight:${isToday?'700':'400'}">${h>0?h+'h':''}</div>
      <div style="width:100%;height:70px;background:#f1f5f9;border-radius:5px;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;border:${isToday?'2px solid var(--primary)':'1px solid var(--border)'};position:relative;" title="${dayNames[i]}: ${h}h">
        <div style="display:flex;height:${pct}%;width:100%;transition:height .4s;">${stackHTML}</div>
      </div>
      <div style="font-size:0.72rem;font-weight:${isToday?'700':'400'};color:${isToday?'var(--primary)':'var(--muted)'}">${dayNames[i]}</div>
      <div style="font-size:0.62rem;color:#a0aec0">${k.slice(5).replace('-','/')}</div>
    </div>`;
  }).join('');

  // 요일별 가로 타임라인 (스택 바)
  const maxDayHforBar = Math.max(1,...dayKeys.map(k=>byDay[k].h));
  const dayRowsHTML = dayKeys.map((k,i)=>{
    const h=byDay[k].h;
    const dayLogs=byDay[k].logs;
    const isToday=k===TODAY_STR;
    const isWeekend=i>=5;
    if(!h && !isToday) return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;opacity:0.4;">
      <div style="width:28px;font-size:0.72rem;font-weight:${isToday?700:400};color:${isWeekend?'#ef4444':'var(--muted)'};">${dayNames[i]}</div>
      <div style="font-size:0.68rem;color:#cbd5e1;width:36px">${k.slice(5).replace('-','/')}</div>
      <div style="flex:1;height:18px;background:#f8fafc;border-radius:4px;border:1px dashed #e2e8f0;"></div>
      <div style="width:30px;font-size:0.72rem;color:#cbd5e1;text-align:right;">—</div>
    </div>`;
    // 스택 바 세그먼트
    const projH={};
    dayLogs.forEach(l=>{ projH[l.project]=(projH[l.project]||0)+l.hours; });
    const segments=Object.entries(projH).map(([pid,ph])=>{
      const w=(ph/maxDayHforBar*100).toFixed(1);
      const pc=proj(pid).color;
      const pn=proj(pid).name;
      return `<div style="height:100%;width:${w}%;background:${pc};display:flex;align-items:center;justify-content:center;overflow:hidden;" title="${pn}: ${ph}h">
        <span style="font-size:0.6rem;color:white;font-weight:700;white-space:nowrap;padding:0 3px;">${ph>=1?ph+'h':''}</span>
      </div>`;
    }).join('');
    return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid ${isToday?'var(--primary)22':'var(--border)'};">
      <div style="width:28px;font-size:0.72rem;font-weight:${isToday?700:400};color:${isToday?'var(--primary)':isWeekend?'#ef4444':'var(--text)'};">${dayNames[i]}</div>
      <div style="font-size:0.68rem;color:var(--muted);width:36px">${k.slice(5).replace('-','/')}</div>
      <div style="flex:1;height:22px;background:#f1f5f9;border-radius:5px;overflow:hidden;display:flex;border:${isToday?'2px solid var(--primary)':'1px solid var(--border)'};">
        ${segments}
      </div>
      <div style="width:36px;font-size:0.78rem;font-weight:700;color:var(--primary);text-align:right;">${h}h</div>
    </div>`;
  }).join('');

  // 프로젝트별 합계 (기록 있는 것만)
  const projSumHTML=projects.filter(p=>byProj[p.id]>0).map(p=>`
    <div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;">
      <span style="width:10px;height:10px;border-radius:50%;background:${p.color};flex-shrink:0;display:inline-block;"></span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name}</span>
      <span style="font-weight:700;color:${p.color};">${byProj[p.id]}h</span>
    </div>`).join('');

  document.getElementById('weekly-summary').innerHTML=`
    <div style="background:var(--pri-light);border-radius:8px;padding:14px 16px;display:flex;gap:20px;flex-wrap:wrap;">
      <!-- 왼쪽: 주차 정보 + 프로젝트별 합계 -->
      <div style="min-width:160px;max-width:200px;display:flex;flex-direction:column;gap:8px;">
        <div>
          <div style="font-size:1rem;font-weight:800;color:var(--primary)">${wLabel}</div>
          <div style="font-size:0.78rem;color:var(--muted);margin-top:2px;">총 <strong style="color:var(--text)">${totalH}시간</strong> · ${logs.length}건</div>
        </div>
        <div style="border-top:1px solid var(--border);padding-top:8px;display:flex;flex-direction:column;gap:5px;">
          ${projSumHTML||'<span style="color:var(--muted);font-size:0.78rem;">기록 없음</span>'}
        </div>
      </div>
      <!-- 오른쪽: 요일별 가로 타임라인 -->
      <div style="flex:1;min-width:260px;">
        <div style="font-size:0.75rem;font-weight:700;color:var(--muted);margin-bottom:6px;">📅 날짜별 업무 시간</div>
        ${dayRowsHTML}
      </div>
    </div>`;

  if(!logs.length){ document.getElementById('weekly-log').innerHTML='<div style="color:var(--muted);padding:14px 0;text-align:center;font-size:0.83rem;">이 주에 기록이 없습니다.</div>'; return; }
  const sorted=[...logs].sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('weekly-log').innerHTML=sorted.map(l=>{
    const p=proj(l.project);
    return `<div class="wlog-item">
      <span class="p-badge" style="background:${p.color}22;color:${p.color};flex-shrink:0">${p.name}</span>
      <div style="flex:1"><div style="font-weight:600">${l.task}</div>${l.memo?`<div style="font-size:0.73rem;color:var(--muted);margin-top:1px">${l.memo}</div>`:''}</div>
      <div style="color:var(--muted);font-size:0.78rem;white-space:nowrap">${fmt(l.date)}</div>
      <div style="font-weight:700;color:var(--primary);white-space:nowrap;min-width:34px;text-align:right">${l.hours}h</div>
      <button class="btn-sm" style="background:var(--pri-light);color:var(--primary)" onclick="openEditWeekly(${l.id})">수정</button>
      <button class="btn-sm" style="background:#fee2e2;color:var(--warn)" onclick="deleteWeekly(${l.id})">삭제</button>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════
   DRAG & DROP — 프로젝트 순서
══════════════════════════════════════ */
let dragProjId=null;
function projDragStart(e,pid){ dragProjId=pid; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function projDragOver(e){
  e.preventDefault(); e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}
function projDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function projDrop(e,targetPid){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragProjId||dragProjId===targetPid) return;
  const fromIdx=projects.findIndex(p=>p.id===dragProjId);
  const toIdx=projects.findIndex(p=>p.id===targetPid);
  if(fromIdx<0||toIdx<0) return;
  const [moved]=projects.splice(fromIdx,1);
  projects.splice(toIdx,0,moved);
  saveAndRender();
}
function projDragEnd(e){ e.currentTarget.classList.remove('dragging','drag-over'); dragProjId=null; }

/* ══════════════════════════════════════
   DRAG & DROP — 업무 순서 (같은 priority 내)
══════════════════════════════════════ */
let dragTaskId=null, dragTaskPrio=null;
function taskDragStart(e,tid,prio){
  dragTaskId=tid; dragTaskPrio=prio;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function taskDragOver(e, targetPrio){
  if(targetPrio!==dragTaskPrio){ e.dataTransfer.dropEffect='none'; return; }
  e.preventDefault(); e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}
function taskDrop(e, targetTid, targetPrio){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragTaskId || dragTaskId===targetTid || dragTaskPrio!==targetPrio) return;
  // 같은 priority 그룹 내에서 subOrder 재정렬
  const samePrio=tasks.filter(t=>(t.priority||'')===(dragTaskPrio||'')).sort((a,b)=>(a.subOrder||0)-(b.subOrder||0));
  const fromIdx=samePrio.findIndex(t=>t.id===dragTaskId);
  const toIdx=samePrio.findIndex(t=>t.id===targetTid);
  if(fromIdx<0||toIdx<0) return;
  const [moved]=samePrio.splice(fromIdx,1);
  samePrio.splice(toIdx,0,moved);
  // subOrder 재부여
  samePrio.forEach((t,i)=>{ const idx=tasks.findIndex(x=>x.id===t.id); if(idx>=0) tasks[idx].subOrder=i; });
  saveToFirebase();
  renderTaskList(filteredTasks());
}

/* ══════════════════════════════════════
   TRASH & HISTORY
══════════════════════════════════════ */
function updateTrashBadge(){
  const badge=document.getElementById('trash-badge');
  if(!badge) return;
  if(trash.length>0){ badge.textContent=trash.length; badge.style.display='inline'; }
  else badge.style.display='none';
}

function renderTrash(){
  updateTrashBadge();
  const el=document.getElementById('trash-list');
  if(!trash.length){
    el.innerHTML='<div style="text-align:center;padding:24px;color:var(--muted);font-size:0.85rem;">휴지통이 비어있습니다.</div>';
    return;
  }
  el.innerHTML=[...trash].reverse().map((item,ri)=>{
    const i=trash.length-1-ri;
    if(item.type==='project'){
      const {project,tasks:pt}=item.data;
      return `<div class="trash-item">
        <span style="font-size:1.2rem">📁</span>
        <div class="ti-meta">
          <div class="ti-name" style="color:${project.color}">${project.name}</div>
          <div class="ti-sub">프로젝트 · 업무 ${pt.length}개 포함 · 삭제일: ${item.deletedAt}</div>
        </div>
        <button class="btn-sm" style="background:var(--pri-light);color:var(--primary)" onclick="restoreTrash(${i})">복원</button>
        <button class="btn-sm" style="background:#fee2e2;color:var(--warn)" onclick="permanentDelete(${i})">영구삭제</button>
      </div>`;
    } else if(item.type==='task'){
      const t=item.data, p=proj(t.project);
      return `<div class="trash-item">
        <span style="font-size:1.2rem">📋</span>
        <div class="ti-meta">
          <div class="ti-name">${t.text}</div>
          <div class="ti-sub"><span style="color:${p.color}">${p.name}</span> · ${t.start}~${t.end} · 삭제일: ${item.deletedAt}</div>
        </div>
        <button class="btn-sm" style="background:var(--pri-light);color:var(--primary)" onclick="restoreTrash(${i})">복원</button>
        <button class="btn-sm" style="background:#fee2e2;color:var(--warn)" onclick="permanentDelete(${i})">영구삭제</button>
      </div>`;
    } else {
      const l=item.data, p=proj(l.project);
      return `<div class="trash-item">
        <span style="font-size:1.2rem">⏱️</span>
        <div class="ti-meta">
          <div class="ti-name">${l.task}</div>
          <div class="ti-sub"><span style="color:${p.color}">${p.name}</span> · ${l.date} · ${l.hours}h · 삭제일: ${item.deletedAt}</div>
        </div>
        <button class="btn-sm" style="background:var(--pri-light);color:var(--primary)" onclick="restoreTrash(${i})">복원</button>
        <button class="btn-sm" style="background:#fee2e2;color:var(--warn)" onclick="permanentDelete(${i})">영구삭제</button>
      </div>`;
    }
  }).join('');
}

function restoreTrash(i){
  const item=trash[i];
  if(!item) return;
  if(item.type==='project'){
    const {project,tasks:pt,weeklyLogs:wl}=item.data;
    if(!projects.find(p=>p.id===project.id)) projects.push(project);
    pt.forEach(t=>{ if(!tasks.find(x=>x.id===t.id)) tasks.push(t); });
    if(wl) wl.forEach(l=>{ if(!weeklyLogs.find(x=>x.id===l.id)) weeklyLogs.push(l); });
  } else if(item.type==='task'){
    if(!tasks.find(x=>x.id===item.data.id)) tasks.push(item.data);
  } else {
    if(!weeklyLogs.find(x=>x.id===item.data.id)) weeklyLogs.push(item.data);
  }
  trash.splice(i,1);
  updateTrashBadge();
  saveAndRender();
}

function permanentDelete(i){
  if(!confirm('영구 삭제합니다. 복원할 수 없습니다.')) return;
  trash.splice(i,1);
  updateTrashBadge();
  saveToFirebase();
  renderTrash();
}

function emptyTrash(){
  if(!trash.length) return;
  if(!confirm(`휴지통의 항목 ${trash.length}개를 모두 영구 삭제합니다. 복원할 수 없습니다.`)) return;
  trash=[];
  updateTrashBadge();
  saveToFirebase();
  renderTrash();
}

function renderHistory(){
  const el=document.getElementById('history-list');
  if(!completedProjects.length){
    el.innerHTML='<div style="text-align:center;padding:24px;color:var(--muted);font-size:0.85rem;">완료된 프로젝트가 없습니다.<br><span style="font-size:0.75rem;">사이드바의 프로젝트 ✔ 버튼으로 완료 처리하세요.</span></div>';
    return;
  }
  el.innerHTML=[...completedProjects].reverse().map((cp,ri)=>{
    const i=completedProjects.length-1-ri;
    const p=cp.project;
    const doneTasks=cp.tasks.filter(t=>t.done).length;
    const totalTasks=cp.tasks.length;
    return `<div class="history-item">
      <div class="hi-head">
        <span style="width:10px;height:10px;border-radius:50%;background:${p.color};display:inline-block;flex-shrink:0"></span>
        <span class="hi-name">${p.name}</span>
        <span style="font-size:0.75rem;background:#dcfce7;color:#15803d;padding:2px 8px;border-radius:10px;font-weight:600;">완료</span>
        <span class="hi-date">완료일: ${p.completedAt||cp.completedAt}</span>
        <button class="btn-sm" style="background:var(--pri-light);color:var(--primary);margin-left:8px;" onclick="restoreHistory(${i})">프로젝트 복원</button>
      </div>
      <div style="font-size:0.78rem;color:var(--muted);">업무 ${totalTasks}개 · 완료 ${doneTasks}개 (${totalTasks?Math.round(doneTasks/totalTasks*100):0}%)</div>
      ${cp.tasks.length?`<div class="hi-tasks">${cp.tasks.map(t=>`<span class="history-task-chip">${t.done?'✓ ':''}${t.text}</span>`).join('')}</div>`:''}
    </div>`;
  }).join('');
}

function restoreHistory(i){
  const cp=completedProjects[i];
  if(!cp) return;
  if(!confirm(`"${cp.project.name}" 프로젝트를 활성 프로젝트로 복원합니다.`)) return;
  if(!projects.find(p=>p.id===cp.project.id)) projects.push(cp.project);
  cp.tasks.forEach(t=>{ if(!tasks.find(x=>x.id===t.id)) tasks.push(t); });
  completedProjects.splice(i,1);
  saveAndRender();
}

function setTaskStatus(id, status){
  tasks=tasks.map(t=>t.id===id?{...t,status}:t);
  saveToFirebase();
  renderTaskList(filteredTasks());
}

/* ══════════════════════════════════════
   PROJECT NOTE
══════════════════════════════════════ */
let currentProjNoteId=null;

function openProjNote(pid){
  const p=projects.find(x=>x.id===pid); if(!p) return;
  currentProjNoteId=pid;
  document.getElementById('proj-note-title').textContent=p.name;
  document.getElementById('proj-note-ta').value=p.note||'';
  renderProjSched(pid);
  document.getElementById('proj-note-panel').classList.add('open');
  // 노트 자동 저장
  document.getElementById('proj-note-ta').oninput=()=>{
    clearTimeout(window._projNoteTimer);
    window._projNoteTimer=setTimeout(()=>{
      projects=projects.map(x=>x.id===pid?{...x,note:document.getElementById('proj-note-ta').value}:x);
      saveToFirebase();
    },800);
  };
}

function closeProjNote(){
  document.getElementById('proj-note-panel').classList.remove('open');
  currentProjNoteId=null;
}

function renderProjSched(pid){
  const p=projects.find(x=>x.id===pid); if(!p) return;
  const scheds=p.schedules||[];
  const el=document.getElementById('proj-sched-list');
  if(!scheds.length){ el.innerHTML='<div style="color:var(--muted);font-size:0.78rem;padding:6px 0;">일정이 없습니다.</div>'; return; }
  el.innerHTML=scheds.map((s,i)=>`<div class="proj-sched-item">
    <span style="font-size:0.75rem;color:var(--muted);white-space:nowrap">${s.date}</span>
    <span style="flex:1">${s.text}</span>
    <button onclick="deleteProjSched('${pid}',${i})" style="background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:0.8rem;" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#cbd5e1'">✕</button>
  </div>`).join('');
}

function toggleSchedForm(){
  const f=document.getElementById('sched-form');
  if(!f) return;
  const show=f.style.display==='none';
  f.style.display=show?'flex':'none';
  if(show){
    document.getElementById('sched-date-input').value=TODAY_STR;
    document.getElementById('sched-text-input').value='';
    document.getElementById('sched-text-input').focus();
  }
}
function addProjSched(){
  const pid=currentProjNoteId; if(!pid) return;
  const date=document.getElementById('sched-date-input').value;
  const text=document.getElementById('sched-text-input').value.trim();
  if(!date||!text) return;
  projects=projects.map(p=>{
    if(p.id!==pid) return p;
    const schedules=[...(p.schedules||[]),{date,text}].sort((a,b)=>a.date.localeCompare(b.date));
    return {...p,schedules};
  });
  toggleSchedForm();
  saveToFirebase();
  renderProjSched(pid);
}

function deleteProjSched(pid,i){
  projects=projects.map(p=>{
    if(p.id!==pid) return p;
    const schedules=[...(p.schedules||[])];
    schedules.splice(i,1);
    return {...p,schedules};
  });
  saveToFirebase();
  renderProjSched(pid);
}

/* ══════════════════════════════════════
   COLOR PALETTE
══════════════════════════════════════ */
const PALETTE=['#4f46e5','#7c3aed','#db2777','#ef4444','#f97316',
               '#f59e0b','#84cc16','#10b981','#06b6d4','#0284c7',
               '#6366f1','#8b5cf6','#ec4899','#64748b','#374151',
               '#065f46','#7f1d1d','#1e3a5f'];

function initPalette(){
  const el=document.getElementById('color-palette');
  if(!el) return;
  const cur=document.getElementById('new-proj-color').value||'#4f46e5';
  el.innerHTML=PALETTE.map(c=>`<div class="color-swatch ${c===cur?'selected':''}" style="background:${c}"
    onclick="selectColor('${c}')"></div>`).join('');
}

function selectColor(c){
  document.getElementById('new-proj-color').value=c;
  document.querySelectorAll('.color-swatch').forEach(el=>{
    el.classList.toggle('selected', el.style.background===hexToRgb(c)||el.style.background===c);
  });
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

/* ══════════════════════════════════════
   SIDEBAR RESIZE
══════════════════════════════════════ */
(function(){
  const resizer=document.getElementById('sidebar-resizer');
  const sidebar=document.getElementById('sidebar');
  if(!resizer||!sidebar) return;
  let startX,startW;
  resizer.addEventListener('mousedown',e=>{
    startX=e.clientX; startW=sidebar.offsetWidth;
    resizer.classList.add('dragging');
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
    e.preventDefault();
  });
  function onMove(e){
    const w=Math.min(400,Math.max(140,startW+(e.clientX-startX)));
    sidebar.style.width=w+'px';
  }
  function onUp(){
    resizer.classList.remove('dragging');
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
  }
})();

function calcScore(){
  const ft=filteredTasks();
  const total=ft.length, done=ft.filter(t=>t.done).length;
  document.getElementById('efficiency-score').textContent=total?Math.round(done/total*100):0;
}

/* ══════════════════════════════════════
   MAIN RENDER
══════════════════════════════════════ */
function render(){
  checkAlerts();
  renderSidebar();
  calcScore();
  updateHeaderWeek();
  const ft=filteredTasks();
  if(currentTab==='today'){ renderGantt(ft); renderTaskList(ft); }
  else if(currentTab==='calendar'){ renderCalendar(); }
  else if(currentTab==='progress'){ renderProgress(); }
  else if(currentTab==='weekly'){ renderWeekly(); }
  else if(currentTab==='history'){ renderHistory(); }
  else if(currentTab==='trash'){ renderTrash(); }
}

/* ══════════════════════════════════════
   TASK CRUD
══════════════════════════════════════ */
function addTask(){
  const text=document.getElementById('task-input').value.trim();
  const projId=document.getElementById('project-select').value;
  const start=document.getElementById('start-date').value;
  const end=document.getElementById('end-date').value;
  const priority=document.getElementById('task-priority').value;
  if(!text||!start||!end) return;
  tasks.push({id:Date.now(),text,project:projId,done:false,start,end,actualEnd:null,priority});
  touchProject(projId);
  document.getElementById('task-input').value='';
  saveAndRender();
}
function deleteTask(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  trash.push({type:'task', data:t, deletedAt:TODAY_STR});
  tasks=tasks.filter(x=>x.id!==id);
  updateTrashBadge();
  saveAndRender();
}
function toggleTask(id){
  tasks=tasks.map(t=>{ if(t.id!==id) return t; touchProject(t.project); return{...t,done:!t.done,actualEnd:!t.done?TODAY_STR:null}; });
  saveAndRender();
}
function completeEarly(id){
  tasks=tasks.map(t=>{ if(t.id!==id) return t; touchProject(t.project); return{...t,done:true,actualEnd:TODAY_STR}; });
  saveAndRender();
}
function openEdit(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  editingId=id;
  document.getElementById('edit-text').value=t.text;
  const sel=document.getElementById('edit-project');
  sel.innerHTML=projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  sel.value=t.project;
  document.getElementById('edit-start').value=t.start;
  document.getElementById('edit-end').value=t.end;
  document.getElementById('edit-priority').value=t.priority||'B2';
  openModal('modal-edit');
}
function saveEdit(){
  const text=document.getElementById('edit-text').value.trim();
  const projId=document.getElementById('edit-project').value;
  const start=document.getElementById('edit-start').value;
  const end=document.getElementById('edit-end').value;
  const priority=document.getElementById('edit-priority').value;
  if(!text||!start||!end) return;
  tasks=tasks.map(t=>t.id===editingId?{...t,text,project:projId,start,end,priority}:t);
  closeModal('modal-edit'); saveAndRender();
}

/* ══════════════════════════════════════
   PROJECT CRUD
══════════════════════════════════════ */
let editingProjId=null;

function openModal_proj_add(){
  editingProjId=null;
  document.getElementById('proj-modal-title').textContent='📁 새 프로젝트 추가';
  document.getElementById('proj-modal-btn').textContent='추가';
  document.getElementById('new-proj-name').value='';
  document.getElementById('new-proj-color').value='#4f46e5';
  setTimeout(initPalette,0);
  openModal('modal-proj');
}
function openEditProject(pid){
  const p=projects.find(x=>x.id===pid); if(!p) return;
  editingProjId=pid;
  document.getElementById('proj-modal-title').textContent='✏️ 프로젝트 수정';
  document.getElementById('proj-modal-btn').textContent='저장';
  document.getElementById('new-proj-name').value=p.name;
  document.getElementById('new-proj-color').value=p.color;
  setTimeout(initPalette,0);
  openModal('modal-proj');
}
function submitProject(){
  const name=document.getElementById('new-proj-name').value.trim();
  const color=document.getElementById('new-proj-color').value;
  if(!name) return;
  if(editingProjId){
    projects=projects.map(p=>p.id===editingProjId?{...p,name,color}:p);
  } else {
    projects.push({id:'p'+Date.now(),name,color,lastAction:TODAY_STR});
  }
  editingProjId=null;
  document.getElementById('new-proj-name').value='';
  closeModal('modal-proj'); saveAndRender();
}
function deleteProject(pid){
  const p=projects.find(x=>x.id===pid);
  if(!p) return;
  const projTasks=tasks.filter(t=>t.project===pid);
  const taskCount=projTasks.length;
  const msg=taskCount>0
    ? `"${p.name}" 프로젝트와 연결된 업무 ${taskCount}개를 휴지통으로 이동합니다.`
    : `"${p.name}" 프로젝트를 휴지통으로 이동합니다.`;
  if(!confirm(msg)) return;
  // 휴지통에 프로젝트 + 연결 업무 + 주간기록 저장
  trash.push({type:'project', data:{project:p, tasks:projTasks, weeklyLogs:weeklyLogs.filter(l=>l.project===pid)}, deletedAt:TODAY_STR});
  tasks=tasks.filter(t=>t.project!==pid);
  weeklyLogs=weeklyLogs.filter(l=>l.project!==pid);
  projects=projects.filter(x=>x.id!==pid);
  if(currentFilter===pid) currentFilter='all';
  updateTrashBadge();
  saveAndRender();
}
// 프로젝트 완료 처리 → 히스토리로 이동
function completeProject(pid){
  const p=projects.find(x=>x.id===pid);
  if(!p) return;
  if(!confirm(`"${p.name}" 프로젝트를 완료 처리하고 히스토리로 이동합니다.`)) return;
  const projTasks=tasks.filter(t=>t.project===pid);
  completedProjects.push({project:{...p, completedAt:TODAY_STR}, tasks:projTasks, completedAt:TODAY_STR});
  tasks=tasks.filter(t=>t.project!==pid);
  weeklyLogs=weeklyLogs.filter(l=>l.project!==pid);
  projects=projects.filter(x=>x.id!==pid);
  if(currentFilter===pid) currentFilter='all';
  saveAndRender();
}
function touchProject(pid){
  projects=projects.map(p=>p.id===pid?{...p,lastAction:TODAY_STR}:p);
}

/* ══════════════════════════════════════
   WEEKLY LOG CRUD
══════════════════════════════════════ */
let editingWeeklyId=null;

function syncWTaskList(){
  const projId=document.getElementById('w-project').value;
  const sel=document.getElementById('w-task-select');
  const projTasks=tasks.filter(t=>t.project===projId);
  sel.innerHTML=`<option value="">-- 업무 선택 --</option>`
    +projTasks.map(t=>`<option value="${t.text}">${t.text}</option>`).join('')
    +`<option value="__custom__">✏️ 직접 입력...</option>`;
  // 직접 입력 숨기기
  document.getElementById('w-task').style.display='none';
  document.getElementById('w-task').value='';
}

function onWTaskSelect(){
  const val=document.getElementById('w-task-select').value;
  const inp=document.getElementById('w-task');
  if(val==='__custom__'){ inp.style.display=''; inp.focus(); }
  else { inp.style.display='none'; inp.value=''; }
}

function openWeeklyAdd(){
  editingWeeklyId=null;
  document.getElementById('w-modal-title').textContent='⏱️ 업무 시간 기록';
  document.getElementById('w-modal-btn').textContent='저장';
  const sel=document.getElementById('w-project');
  sel.innerHTML=projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  if(currentFilter!=='all') sel.value=currentFilter;
  syncWTaskList();
  document.getElementById('w-date').value=TODAY_STR;
  document.getElementById('w-hours').value='';
  document.getElementById('w-memo').value='';
  openModal('modal-weekly');
}

function openEditWeekly(id){
  const l=weeklyLogs.find(x=>x.id===id); if(!l) return;
  editingWeeklyId=id;
  document.getElementById('w-modal-title').textContent='✏️ 기록 수정';
  document.getElementById('w-modal-btn').textContent='수정 저장';
  const pSel=document.getElementById('w-project');
  pSel.innerHTML=projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  pSel.value=l.project;
  syncWTaskList();
  // 선택값 세팅
  const tSel=document.getElementById('w-task-select');
  const exists=[...tSel.options].find(o=>o.value===l.task);
  if(exists){ tSel.value=l.task; document.getElementById('w-task').style.display='none'; }
  else {
    tSel.value='__custom__';
    document.getElementById('w-task').style.display='';
    document.getElementById('w-task').value=l.task;
  }
  document.getElementById('w-date').value=l.date;
  document.getElementById('w-hours').value=l.hours;
  document.getElementById('w-memo').value=l.memo||'';
  openModal('modal-weekly');
}

function saveWeeklyLog(){
  const projId=document.getElementById('w-project').value;
  const selVal=document.getElementById('w-task-select').value;
  const task=(selVal==='__custom__'||selVal==='')
    ? document.getElementById('w-task').value.trim()
    : selVal;
  const date=document.getElementById('w-date').value;
  const hours=parseFloat(document.getElementById('w-hours').value);
  const memo=document.getElementById('w-memo').value.trim();
  if(!task||!date||isNaN(hours)||hours<=0) return;
  if(editingWeeklyId){
    weeklyLogs=weeklyLogs.map(l=>l.id===editingWeeklyId?{...l,project:projId,task,date,hours,memo}:l);
  } else {
    weeklyLogs.push({id:Date.now(),project:projId,task,date,hours,memo});
    selectedWeekKey=isoWeekKey(date);
  }
  editingWeeklyId=null;
  closeModal('modal-weekly'); saveAndRender();
}
function deleteWeekly(id){
  const l=weeklyLogs.find(x=>x.id===id); if(!l) return;
  trash.push({type:'weekly', data:l, deletedAt:TODAY_STR});
  weeklyLogs=weeklyLogs.filter(x=>x.id!==id);
  updateTrashBadge();
  saveToFirebase();
  renderWeekly();
}
